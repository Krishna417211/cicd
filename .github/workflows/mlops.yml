name: MLOps CI-CD Pipeline

# Runs automatically on: push, a weekly schedule (automated retraining), or manually
on:
  push:
    branches: [ main, master ]
  schedule:
    # Automated retraining: runs every Monday at 03:00 UTC.
    # cron format: minute hour day-of-month month day-of-week
    - cron: "0 3 * * 1"
  workflow_dispatch:      # also lets you run it manually from the Actions tab

jobs:
  # ==========================================================
  # JOB 1: BUILD, TRAIN, EVALUATE  (the "CI" part)
  # ==========================================================
  train-and-evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: DVC pull data
        run: |
          dvc pull || echo "No DVC remote configured, using data in repo"

      # ---- preprocess ----
      - name: Preprocess data
        run: python src/preprocess.py

      # ---- train + MLflow ----
      - name: Train model (MLflow tracking)
        run: python src/train.py

      # ---- export SavedModel for TensorFlow Serving ----
      - name: Export model for TF Serving
        run: python scripts/export_savedmodel.py

      # ---- start TensorFlow Serving and test it ----
      # Runs the official tensorflow/serving container, mounts the exported
      # model, waits for it to boot, then sends a real prediction request.
      - name: Deploy & test with TensorFlow Serving
        run: |
          echo "Starting TensorFlow Serving container..."
          docker run -d --name tf-serving \
            -p 8501:8501 \
            -v "${{ github.workspace }}/models/taxi_model:/models/taxi_model" \
            -e MODEL_NAME=taxi_model \
            tensorflow/serving:latest

          echo "Waiting for TF Serving to be ready..."
          for i in $(seq 1 20); do
            if curl -s http://localhost:8501/v1/models/taxi_model | grep -q "AVAILABLE"; then
              echo "TF Serving is up."
              break
            fi
            sleep 3
          done

          echo "Model status:"
          curl -s http://localhost:8501/v1/models/taxi_model

          echo ""
          echo "Sending a test prediction (4 features)..."
          curl -s -X POST http://localhost:8501/v1/models/taxi_model:predict \
            -H "Content-Type: application/json" \
            -d '{"instances": [[1, 2.5, 10.0, 2.0]]}'

          echo ""
          echo "Stopping TF Serving container..."
          docker stop tf-serving && docker rm tf-serving

      # ---- monitor ----
      - name: Monitor model
        run: python scripts/monitor.py

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: |
            models/taxi_model.keras
            models/taxi_model/
            best_model.json
            mlflow.db

  # ==========================================================
  # JOB 2: DEPLOY  (builds and publishes the serving image)
  # ==========================================================
  deploy:
    needs: train-and-evaluate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: .

      - name: Build Docker image
        run: docker build -t taxi-fare-api .

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          docker tag taxi-fare-api $IMAGE:latest
          docker push $IMAGE:latest